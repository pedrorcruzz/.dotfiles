  [[blocks.segments]]
    leading_diamond = ' ¯éÂ'
    trailing_diamond = '¯é┤'
    template = ' ¯£© {{ .Major }}.{{ .Minor }} '
    foreground = '#E64747'
    background = '#181818'
    type = 'java'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = ' ¯éÂ'
    trailing_diamond = '¯é┤'
    template = ' ¯ÿê {{ .Major }}.{{ .Minor }} '
    foreground = '#A872C9'
    background = '#181818'
    type = 'php'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = ' ¯éÂ'
    trailing_diamond = '¯é┤'
    template = ' ¾░øª {{ .Major }}.{{ .Minor }} '
    foreground = '#007ACC'
    background = '#181818'
    type = 'typescript'
    style = 'diamond'

    [blocks.segments.properties]
