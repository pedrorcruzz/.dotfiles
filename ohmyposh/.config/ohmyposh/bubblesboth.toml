[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = 'ÔØ»'
    background = 'transparent'
    type = 'text'
    style = 'plain'
    foreground_templates = ['{{if gt .Code 0}}#E38073{{end}}', '{{if eq .Code 0}}#9B6BDF{{end}}']

    [blocks.segments.properties]
      cache_duration = 'none'
