console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 3
final_space = true

[secondary_prompt]
  template = 'ÔØ»ÔØ» '
  foreground = '#FFFFFF'
  background = 'transparent'

[transient_prompt]
  template = 'ÔØ» '
  background = 'transparent'
  foreground_templates = ['{{if gt .Code 0}}red{{end}}', '{{if eq .Code 0}}magenta{{end}}']

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = '¯éÂ'
    trailing_diamond = '¯é┤ '
    template = '{{.Icon}}'
    foreground = '#FFFFFF'
    background = '#808080'
    type = 'os'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = '¯éÂ'
    trailing_diamond = '¯é┤ '
    template = '{{ .UserName }} ÔØ»'
    foreground = '#FFFFFF'
    background = '#181818'
    type = 'session'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    leading_diamond = '¯éÂ'
    trailing_diamond = '¯é┤'
    template = '¯ù┐ {{ .Path }}'
    foreground = '#FFFFFF'
    background = '#181818'
    type = 'path'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'
      cycle = ['#9B6BDF', '#a6a3a6', '#9B6BDF']
      folder_icon = '´ü╝'
      home_icon = '´Çò '
      max_width = 20
      style = 'powerlevel'

  [[blocks.segments]]
    leading_diamond = ' ¯éÂ'
    trailing_diamond = '¯é┤'
    template = '<#FFFFFF>{{ url .UpstreamIcon .UpstreamURL }}</> {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ´üä <#22d3ee> ?{{.Working.Untracked}}</> ~{{ .Working.Modified }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} ´üå {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}<#34d399> ´âç {{ .StashCount }}</>{{ end }}'
    foreground = '#FFFFFF'
    background = '#111111'
    type = 'git'
    style = 'diamond'
    foreground_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}#FFFFFF{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FFCC80{{ end }}', '{{ if gt .Ahead 0 }}#B388FF{{ end }}', '{{ if gt .Behind 0 }}#B388FB{{ end }}']

    [blocks.segments.properties]
      branch_icon = '´Éÿ '
      branch_max_length = 25
      cache_duration = 'none'
      commit_icon = '@'
      fetch_status = true
      fetch_upstream_icon = true
      truncate_symbol = 'ÔÇª'

  [[blocks.segments]]
    leading_diamond = ' ¯éÂ'
    trailing_diamond = '¯é┤'
    template = ' ¯£╝ {{ .Major }}.{{ .Minor }} '
    foreground = '#E4F34A'
    background = '#181818'
    type = 'python'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = ' ¯éÂ'
    trailing_diamond = '¯é┤'
    template = ' ¯£ÿ {{ .Major }}.{{ .Minor }} '
    foreground = '#42E66C'
    background = '#181818'
