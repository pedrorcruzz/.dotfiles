  [[blocks.segments]]
    leading_diamond = ' ¯éÂ'
    trailing_diamond = '¯é┤'
    template = ' ¯Üï {{ .Major }}.{{ .Minor }} '
    foreground = '#FFFFFF'
    background = '#181818'
    type = 'rust'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = ' ¯éÂ'
    trailing_diamond = '¯é┤'
    template = ' ¯×ÿ {{ .Major }}.{{ .Minor }} '
    foreground = '#00b4AB'
    background = '#181818'
    type = 'dart'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = '¯éÂ'
    trailing_diamond = '¯é┤ '
    template = '¯ê║ '
    foreground = '#606060'
    background = 'transparent'
    type = 'status'
    foreground_templates = ['{{ if gt .Code 0 }}#E38073{{ end }}']

    [blocks.segments.properties]
      always_enabled = true
      cache_duration = 'none'

  [[blocks.segments]]
    template = '{{ .FormattedMs }}'
    foreground = 'yellow'
    background = 'transparent'
    type = 'executiontime'
    style = 'plain'

    [blocks.segments.properties]
