disabled = false

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="пҗҲ "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="пҠ– "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="п…ұ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="пһЎ "
else
    GIT_REMOTE_SYMBOL="оӘ„ " 
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
format = "$output"


[git_branch]
symbol = "[оӮ¶](#090909)пҗҳ "
style = "fg:white bg:#090909"
format =  ' [$symbol$branch]($style)[оӮҙ](#090909)'


# [git_branch]
# style = 'fg:white'
# symbol = 'пҗҳ '
# format = ' [on] [$symbol$branch ]($style)'

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[рҹҚ’ PICKING](bold red)'

[git_commit]
commit_hash_length = 4
tag_symbol = 'рҹ”– '


[git_status]
conflicted = '[вң–(#FF0000)]'
ahead = '[в¬Ҷ\($count\)](#ffffff)'  
behind = '[в¬Ү\($count\)](#8A2BE2)'
diverged = '[вҮө](#FF4500)'
up_to_date = '[вң”](#cacaca)'
untracked = '[?\($count\)](#3CBDFF)' 
stashed = '[в§ү](#FFD700)'
modified = '[!\($count\)](#85FCF9)'  
staged = '[+\($count\)](#B3F8C5)'
renamed = '[вүЎ](#8A2BE2)'
deleted = '[-\($count\)](#FFC4C0)'


# [git_status]
# format = ' [($all_status$ahead_behind )]($style)'


[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = false
style = 'bold blue'
symbol = "оҢҪ "

[lua]
