command_timeout = 1000

palette = "custom"


"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$os ➜\
$directory\
${custom.giturl}\
$git_branch\
$git_state\
$git_status\
$fill\
$python\
$elixir\
$dart\
$lua\
$nodejs\
${custom.typescript}\
$golang\
$haskell\
$kotlin\
$java\
$php\
$swift\
$rust\
$ruby\
${custom.docker}\
${custom.yarn}\
${custom.pnpm}\
$bun\
$package\
$aws\
$docker_context\
$cmd_duration\
$time\
$line_break\
$character"""


[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = " "
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"


[fill]
symbol = " "  
style = "none" 

[username]
# show_always = true
# style_user = "bg:surface0 fg:text"
# style_root = "bg:surface0 fg:text"
# format = '[ $user ]($style)'

[directory]
style = "sapphire"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false


[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"Music" = "󰝚"
"Pictures" = ""
"Developer" = "󰲋"

[line_break]
disabled = false

[os]
# symbol = "    " 
# style = "fg:white bg:#090909"
# format = "[](#090909)[$symbol]($style)[](#090909)"
disabled = false

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL=" "
else
    GIT_REMOTE_SYMBOL=" "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
format = "at $output"


[git_branch]
symbol = "[](#090909) "
style = "fg:white bg:#090909"
format =  ' on [$symbol$branch]($style)[](#090909)'


# [git_branch]
# style = 'fg:white'
# symbol = ' '
# format = ' [on] [$symbol$branch ]($style)'

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[🍒 PICKING](bold red)'

[git_commit]
commit_hash_length = 4
tag_symbol = '🔖 '


[git_status]
conflicted = '🏳'
ahead = '🏎💨'
behind = '😰'
diverged = '😵'
up_to_date = '✓'
untracked = '[?\($count\)](purple)' 
stashed = '📦'
modified = '[!\($count\)](yellow)'  
staged = '[+\($count\)](green)'
renamed = '👅'
deleted = '[-\($count\)](red)'


# [git_status]
# format = ' [($all_status$ahead_behind )]($style)'


[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = false
style = 'bold blue'
symbol = " "

[lua]
symbol = ' '
format = '[ $symbol( $version) ]($style)'


[dart]
symbol = ' '
format = '[ $symbol( $version) ]($style)'

[elixir]
symbol = ' '
format = '[ $symbol( $version) ]($style)'


[nodejs]
symbol = "[](#090909) "
style = "fg:green bg:#090909"
format = '[$symbol( $version) ]($style)[](#090909)'
# [nodejs]
# symbol = ' '
# format = '[ $symbol( $version) ]($style)'

[custom.pnpm]
symbol = ' '
format = '[ $symbol( $version) ]($style)'

[custom.yarn]
symbol = ' '
format = '[ $symbol( $version) ]($style)'

[bun]
symbol = '🍔 '
format = '[ $symbol( $version) ]($style)'

[package]
# symbol = '󰏗 '
symbol = '📦 '
format = '[ $symbol( $version) ]($style)'


[custom.typescript]
symbol = ""
format = '[[ $symbol( $version) ]]($style)'
detect_extensions = ["ts", "tsx"]


[c]
symbol = " "
format = '[[ $symbol( $version) ]]($style)'

[rust]
symbol = ""
format = '[[ $symbol( $version) ]]($style)'

[golang]
symbol = ""
format = '[ $symbol( $version) ]($style)'
detect_files = ["go.mod"]

[php]
symbol = ""
format = '[[ $symbol( $version) ]]($style)'

[java]
symbol = " "
format = '[[ $symbol( $version) ]]($style)'

[kotlin]
symbol = ""
format = '[[ $symbol( $version) ]]($style)'

[haskell]
symbol = ""
format = '[[ $symbol( $version) ]]($style)'

[ruby]
symbol = ' '
format = '[[ $symbol( $version) ]]($style)'


[python]
symbol = "[](#090909) "
style = "fg:yellow bg:#090909"
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)[](#090909)'
pyenv_version_name = true
pyenv_prefix = ''

# [python]
# symbol = ' '
# format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
# pyenv_version_name = true
# pyenv_prefix = ''

[swift]
symbol = ' '
format = '[[ $symbol( $version) ]]($style)'

[docker_context]
# symbol = ' '
symbol = ' 🐳 '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[custom.docker]
disabled = false
symbol = '🐳 '
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']



[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:peach"
format = '[[  $time ](fg:white bg:foam)]($style)'

[env_var]
symbol = "[╭╴](bold fg:white)"
variable = 'SHELL'
format = "$symbol"
disabled = false


[character]
disabled = false
success_symbol = '[❯](bold fg:purple)' 
error_symbol = '[✘](bold fg:red)'
# success_symbol = '[╰⎯](bold fg:white)'
# error_symbol = '[╰⎯](bold fg:red)'
vimcmd_symbol = '[](bold fg:purple)'
vimcmd_replace_one_symbol = '[](bold fg:purple)'
vimcmd_replace_symbol = '[](bold fg:purple)'
vimcmd_visual_symbol = '[](bold fg:lavender)'


