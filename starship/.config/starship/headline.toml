[c]
symbol = " "
format = '[via](#52676b)[[$symbol($version) ]]($style)'

[rust]
symbol = " "
format = '[via](#52676b)[[$symbol($version) ]]($style)'

[golang]
symbol = " " #  
format = '[via](#52676b)[$symbol($version) ]($style)'
detect_files = ["go.mod"]

[php]
symbol = " "
format = '[via](#52676b)[$symbol($version) ]($style)'

[java]
symbol = " "
format = '[via](#52676b)[[$symbol($version) ]]($style)'

[kotlin]
symbol = " "
format = '[via](#52676b)[[$symbol($version) ]]($style)'

[haskell]
symbol = " "
format = '[via](#52676b)[[$symbol($version) ]]($style)'

[ruby]
symbol = ' '
format = '[via](#52676b)[[$symbol($version) ]]($style)'



[python]
symbol = ' '
style = "fg:#F1CA81"
format = '[via](#52676B) [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
