
command_timeout = 1000

palette = "custom"


"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

# $os ➜\
format = """
$username\
$directory\
$fill\
${custom.giturl}\
$git_branch\
$git_state\
$git_status\
$python\
$elixir\
$dart\
$lua\
$nodejs\
${custom.typescript}\
$golang\
$haskell\
$kotlin\
$java\
$php\
$swift\
$rust\
$ruby\
${custom.docker}\
${custom.yarn}\
${custom.pnpm}\
$bun\
$package\
$aws\
$cmd_duration\
$line_break\
$time\
$character"""


[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = ""
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

# ━━
[fill]
symbol = " ─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────"
style = "#52676B" 

[username]
show_always = true
style_user = "bold #ffffff"
style_root = "bold #ffffff"
format = '[](#ffffff)[ $user ]($style)'


[directory]
style = "bold #c18efe"  
# format = "in  [$path ]($style)"
format = "[in](#52676B) [ $path]($style)"
truncation_length = 2
truncation_symbol = '' #../
truncate_to_repo = false


[directory.substitutions]
"~" = "Root" 
".dotfiles" ="Dotfiles"
# "Workspace" = " " 
# "Documents" = "󰈙"
# "Downloads" = ""
# "Music" = "󰝚"
# "Pictures" = ""
# "Developer" = "󰲋"


[os]
# symbol = "    " 
# style = "fg:white bg:#090909"
# format = "[](#090909)[$symbol]($style)[](#090909)"
disabled = false

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL=" "
else
    GIT_REMOTE_SYMBOL=" " 
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
format = "$output"


[git_branch]
symbol = "[](#090909) "
style = "fg:white bg:#090909"
format =  ' [$symbol$branch]($style)[](#090909)'


# [git_branch]
# style = 'fg:white'
# symbol = ' '
# format = ' [on] [$symbol$branch ]($style)'

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[🍒 PICKING](bold red)'

[git_commit]
commit_hash_length = 4
tag_symbol = '🔖 '


[git_status]
conflicted = '[✖(#FF0000)]'
ahead = '[⬆\($count\)](#ffffff)'  
behind = '[⬇\($count\)](#8A2BE2)'
diverged = '[⇵](#FF4500)'
up_to_date = '[✔](#cacaca)'
untracked = '[?\($count\)](#3CBDFF)' 
stashed = '[⧉](#D69CFF)'
modified = '[!\($count\)](#85FCF9)'  
staged = '[+\($count\)](#B3F8C5)'
renamed = '[≡](#8A2BE2)'
deleted = '[-\($count\)](#FFC4C0)'


# [git_status]
# format = ' [($all_status$ahead_behind )]($style)'


[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = false
style = 'bold blue'
symbol = " "

[lua]
symbol = ' '
format = '[via](#52676b) [$symbol($version) ]($style)'


[dart]
symbol = ' '
format = '[via](#52676b)[$symbol($version) ]($style)'

[elixir]
symbol = ' '
format = '[via](#52676b)[$symbol($version) ]($style)'

[nodejs]
symbol = ' '
format = '[via](#52676B) [$symbol($version)]($style)'

[custom.pnpm]
symbol = ' '
format = '[ $symbol($version) ]($style)'

[custom.yarn]
symbol = ' '
format = '[ $symbol($version) ]($style)'

[bun]
symbol = '🍔 '
format = '[ $symbol($version) ]($style)'

[package]
# symbol = '󰏗 '
symbol = '📦 '
format = '[ $symbol($version) ]($style)'


[custom.typescript]
style = "bold #007ACC"  
symbol = " " 
format = '[ $symbol($version) ]($style)'
